name: "Deploy Core"

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
      - 'api/**'

jobs:
  terraform-apply:
    permissions:
      id-token: write
      contents: read
    uses: kitsune242/aws-common/.github/workflows/terraform.yml@v1.0.0
    secrets: inherit
    with:
      path: "infra"
      env: dev
      action: "apply"
      common_ref: "v1.0.0"
